    - Data flows through Zapier cloud.
    - Self-hosting not possible.
  homepage: https://zapier.com

- slug: make
  name: Make (formerly Integromat)
  category: automation
  tagline: Visual automation builder.
  pricing: Free tier; Core from $9/month.
  common_gripes:
