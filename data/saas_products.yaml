# Popular SaaS products people search alternatives for.
# Each gets its own "Alternatives to {name}" page.

- slug: notion
  name: Notion
  category: note-taking
  tagline: All-in-one workspace for notes, docs, and databases.
  pricing: Free tier; paid from $10/user/month.
  common_gripes:
    - Data lives on someone else's server; sensitive notes feel exposed.
    - Slow on large workspaces and offline support is limited.
    - Export options for full workspaces are clunky.
  homepage: https://www.notion.so

- slug: evernote
  name: Evernote
  category: note-taking
  tagline: Classic note-taking and web-clipper.
  pricing: Free tier (now limited to 50 notes); Personal from $14.99/month.
  common_gripes:
    - Free tier has become heavily restricted.
    - Price increases have frustrated long-time users.
    - Syncing and search performance complaints.
  homepage: https://evernote.com

- slug: obsidian
  name: Obsidian
  category: note-taking
  tagline: Local-first markdown knowledge base (closed source, free for personal use).
  pricing: Free for personal use; Sync $5/month.
  common_gripes:
    - Not open source despite being free.
    - Mobile app is limited compared to desktop.
    - Sync requires paid add-on or custom setup.
  homepage: https://obsidian.md

- slug: slack
  name: Slack
  category: team-communication
  tagline: Team messaging with channels, threads, and integrations.
  pricing: Free tier limited to 90 days of history; Pro from $7.25/user/month.
  common_gripes:
    - Free tier message history cap makes it unusable for serious teams.
    - Data residency concerns for EU and regulated industries.
    - Per-seat pricing scales expensively.
  homepage: https://slack.com

- slug: discord
  name: Discord
  category: team-communication
  tagline: Voice, video, and text chat — popular with gamers and communities.
  pricing: Free with Nitro upgrades.
  common_gripes:
    - Closed ecosystem — you do not own your community data.
    - Ads and promoted servers are growing.
    - Moderation tooling can be limited for large communities.
  homepage: https://discord.com

- slug: whatsapp
  name: WhatsApp
  category: team-communication
  tagline: Global mobile messaging.
  pricing: Free.
  common_gripes:
    - Owned by Meta; metadata and backup privacy concerns.
    - No federation — you are locked into the platform.
    - Mandatory phone number for account.
  homepage: https://whatsapp.com

- slug: zoom
  name: Zoom
  category: video-conferencing
  tagline: Video meetings, webinars, and events.
  pricing: Free tier with 40-min group call limit; Pro from $14.99/month.
  common_gripes:
    - Past security incidents and data-handling concerns.
    - 40-minute limit on free tier.
    - Data travels through Zoom cloud — unacceptable for some regulated use cases.
  homepage: https://zoom.us

- slug: google-meet
  name: Google Meet
  category: video-conferencing
  tagline: Meetings embedded in Google Workspace.
  pricing: Free (time-limited for groups); full access with Workspace.
  common_gripes:
    - Tied to Google account ecosystem.
    - Free tier has 60-minute limit on group calls.
    - Privacy concerns for non-Workspace users.
  homepage: https://meet.google.com

- slug: trello
  name: Trello
  category: project-management
  tagline: Simple kanban boards.
  pricing: Free tier; Standard from $5/user/month.
  common_gripes:
    - Power-ups add up fast once you need automation.
    - Large boards get slow.
    - No self-hosted option.
  homepage: https://trello.com

- slug: asana
  name: Asana
  category: project-management
  tagline: Project and task management for teams.
  pricing: Free tier for up to 10; Premium from $10.99/user/month.
  common_gripes:
    - Pricing jumps significantly beyond Basic tier.
    - Steep learning curve for advanced features.
    - Lock-in: exporting workflows is painful.
  homepage: https://asana.com

- slug: jira
  name: Jira
  category: project-management
  tagline: Issue tracking and agile planning.
  pricing: Free up to 10 users; Standard from $7.53/user/month.
  common_gripes:
    - Overly complex for small teams.
    - Performance issues on large instances.
    - Atlassian's pricing and cloud-migration controversies.
  homepage: https://www.atlassian.com/software/jira

- slug: monday
  name: Monday.com
  category: project-management
  tagline: Work OS with flexible boards and automations.
  pricing: Free trial; Basic from $9/user/month (3-seat minimum).
  common_gripes:
    - Minimum-seat pricing inflates costs for small teams.
    - Can feel bloated.
    - No self-hosted option.
  homepage: https://monday.com

- slug: dropbox
  name: Dropbox
  category: file-storage
  tagline: File sync and sharing.
  pricing: Free 2 GB; Plus from $11.99/month for 2 TB.
  common_gripes:
    - Expensive compared to self-hosted storage at scale.
    - Desktop client resource usage.
    - File history and version retention limits.
  homepage: https://dropbox.com

- slug: google-drive
  name: Google Drive
  category: file-storage
  tagline: Google's cloud storage and productivity hub.
  pricing: 15 GB free shared with Google account; paid from $1.99/month.
  common_gripes:
    - Data indexed by Google.
    - 15 GB free tier is shared across Gmail, Photos, and Drive.
    - Locking in to Google ecosystem.
  homepage: https://drive.google.com

- slug: onedrive
  name: OneDrive
  category: file-storage
  tagline: Microsoft's cloud storage integrated with Windows.
  pricing: 5 GB free; 100 GB from $1.99/month.
  common_gripes:
    - Heavy integration with Windows — hard to disable.
    - Privacy concerns around telemetry.
    - Moving files away later is painful.
  homepage: https://onedrive.com

- slug: google-docs
  name: Google Docs
  category: office-docs
  tagline: Collaborative word processor.
  pricing: Free with Google account.
  common_gripes:
    - Data mined by Google.
    - Offline support is limited.
    - No self-hosted version for sensitive documents.
  homepage: https://docs.google.com

- slug: microsoft-365
  name: Microsoft 365
  category: office-docs
  tagline: Office suite in the cloud — Word, Excel, PowerPoint.
  pricing: Personal from $6.99/month.
  common_gripes:
    - Subscription-only model for full features.
    - Heavy client, frequent updates.
    - Cloud storage quota included but limited.
  homepage: https://microsoft.com/microsoft-365

- slug: figma
  name: Figma
  category: design-tools
  tagline: Collaborative interface design in the browser.
  pricing: Free tier; Professional from $15/editor/month.
  common_gripes:
    - Cloud-only — no self-hosted option for confidential work.
    - Adobe acquisition (later abandoned) shook trust.
    - Pricing jumps once teams grow.
  homepage: https://figma.com

- slug: canva
  name: Canva
  category: design-tools
  tagline: Drag-and-drop graphic design for everyone.
  pricing: Free tier; Pro from $14.99/month.
  common_gripes:
