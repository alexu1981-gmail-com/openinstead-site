# Open source alternatives — each gets its own profile page.
# self_host_difficulty: 1 (easy, docker-one-command) to 5 (complex, multi-server).
# license values: standard SPDX ids.

- slug: appflowy
  name: AppFlowy
  category: note-taking
  tagline: Open source alternative to Notion, built in Rust and Flutter.
  license: AGPL-3.0
  self_host_difficulty: 3
  hosted_cloud_option: true
  desktop_apps: [Windows, macOS, Linux]
  mobile_apps: [iOS, Android]
  website: https://appflowy.io
  github: https://github.com/AppFlowy-IO/AppFlowy
  strengths:
    - Familiar Notion-style blocks and databases.
    - Local-first desktop app for privacy.
    - Active development and growing plugin ecosystem.
  weaknesses:
    - Newer project — some Notion features still missing.
    - Real-time collaboration is still maturing.
    - Mobile apps lag behind desktop.

