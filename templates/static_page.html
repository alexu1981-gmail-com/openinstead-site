{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="crumbs"><a href="{{ root_prefix }}/">Home</a> / {{ page_heading }}</div>
  <div class="article-head">
    <h1>{{ page_heading }}</h1>
    {% if lead %}<p class="lead">{{ lead }}</p>{% endif %}
  </div>
</div>

<section class="section">
  <div class="container" style="max-width:800px">
    {{ body | safe }}
  </div>
</section>
{% endblock %}
